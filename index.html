<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domus</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div id="map-overlay" onclick="fecharLore()"></div>
    <div id="map"></div>

    <div id="sidebar-lore">
        <button class="botao-fechar" onclick="fecharLore()">&times;</button>
        <div id="sidebar-conteudo"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="dados-mapa.js"></script>
    
    <script>
        var alturaReal = 7000;
        var larguraReal = 10000;

        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 4,  
            maxZoom: 6,  
            noWrap: true
        });

        var sulOeste = map.unproject([0, alturaReal], map.getMaxZoom());
        var norteLeste = map.unproject([larguraReal, 0], map.getMaxZoom());
        var limites = L.latLngBounds(sulOeste, norteLeste);

        map.setView(map.unproject([larguraReal / 2, alturaReal / 2], map.getMaxZoom()), 4);
        map.setMaxBounds(limites);

        L.tileLayer('mapa-tiles/{z}/{x}/{y}.png', {
            bounds: limites,
            noWrap: true,
            tms: true,
            tileSize: 256,
            attribution: 'Domus (Ēa)'
        }).addTo(map);

        var estiloReino = {
            color: 'transparent',
            fillColor: '#ffffff',
            fillOpacity: 0.0,    
            interactive: true
        };

        // --- FUNÇÕES DO PAINEL LATERAL ---
        function abrirLore(idReino) {
            var dados = bancoDeLore[idReino];
            if (dados) {
                var conteudoHTML = "<h3>" + dados.titulo + "</h3><div class='texto-scroll'>" + dados.texto + "</div>";
                document.getElementById('sidebar-conteudo').innerHTML = conteudoHTML;
                document.getElementById('sidebar-lore').classList.add('ativo');
                document.getElementById('map-overlay').classList.add('ativo');
            }
        }

        function fecharLore() {
            document.getElementById('sidebar-lore').classList.remove('ativo');
            document.getElementById('map-overlay').classList.remove('ativo');
        }

        var sidebarElemento = document.getElementById('sidebar-lore');
        L.DomEvent.disableScrollPropagation(sidebarElemento);
        L.DomEvent.disableClickPropagation(sidebarElemento);

        // --- CRIAÇÃO DOS POLÍGONOS (Puxando as variáveis do arquivo dados-mapa.js) ---
        var reinoDeofyy = L.polygon(contornoDeofyy, estiloReino).addTo(map);
        reinoDeofyy.on('click', function() { abrirLore('deofyy'); });

        var reinoTreferih = L.polygon(contornoTreferih, estiloReino).addTo(map);
        reinoTreferih.on('click', function() { abrirLore('treferih'); });

        var reinoFoas = L.polygon(contornoFoas, estiloReino).addTo(map);
        reinoFoas.on('click', function() { abrirLore('foas'); });

        var reinoKabhan = L.polygon(contornoKabhan, estiloReino).addTo(map);
        reinoKabhan.on('click', function() { abrirLore('kabhan'); });

        var reinoNica = L.polygon(contornoNica, estiloReino).addTo(map);
        reinoNica.on('click', function() { abrirLore('nica'); });

        // --- EFICÁCIA DO HOVER ---
        function adicionarEfeitoHover(reino) {
            reino.on('mouseover', function() { this.setStyle({ fillOpacity: 0.1 }); });
            reino.on('mouseout', function() { this.setStyle({ fillOpacity: 0.0 }); });
        }
        adicionarEfeitoHover(reinoDeofyy);
        adicionarEfeitoHover(reinoTreferih);
        adicionarEfeitoHover(reinoFoas);
        adicionarEfeitoHover(reinoKabhan);
        adicionarEfeitoHover(reinoNica);

        // --- AUXILIAR DE COORDENADAS ---
        map.on('click', function(e) {
            var coord = e.latlng;
            console.log("Coordenada do clique: [" + coord.lat + ", " + coord.lng + "]");
        });
    </script>
</body>
</html>
