        // 1. Dimensões reais do seu mapa em pixels
        var alturaReal = 7000;
        var larguraReal = 10000;

        // 2. Configura o mapa travando o zoomout máximo no nível 4
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: 4,  
            maxZoom: 6,  
            noWrap: true
        });

        // 3. Mapeia os pixels diretamente para o sistema do Leaflet
        var sulOeste = map.unproject([0, alturaReal], map.getMaxZoom());
        var norteLeste = map.unproject([larguraReal, 0], map.getMaxZoom());
        var limites = L.latLngBounds(sulOeste, norteLeste);

        // Força a câmera a sempre iniciar no Zoom 4 centralizado
        map.setView(map.unproject([larguraReal / 2, alturaReal / 2], map.getMaxZoom()), 4);
        
        // Bloqueia o arraste para fora da área da imagem
        map.setMaxBounds(limites);

        // 4. Carrega as pastas numeradas do mapa
        L.tileLayer('mapa-tiles/{z}/{x}/{y}.png', {
            bounds: limites,
            noWrap: true,
            tms: true,
            tileSize: 256,
            attribution: 'Domus (Ēa)'
        }).addTo(map);
